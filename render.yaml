services:
  - type: web
    name: qwen-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_API_BASE
        sync: false
      - key: QWEN_MODEL
        value: auto
      - key: SYSTEM_PROMPT
        value: You are a helpful AI assistant powered by Qwen. Respond concisely and helpfully.
      - key: ADMIN_IDS
        sync: false
      - key: RATE_LIMIT_SECONDS
        value: 3
      - key: MAX_HISTORY
        value: 10
